name: release-build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=""
          VERSION_FILE=""
          for f in internal/dawnfetch/cli/run.go internal/dawnfetch/run.go; do
            if [[ -f "${f}" ]]; then
              CANDIDATE="$(sed -nE 's/^[[:space:]]*var[[:space:]]+version[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/p' "${f}" | head -n1)"
              if [[ -n "${CANDIDATE}" ]]; then
                VERSION="${CANDIDATE}"
                VERSION_FILE="${f}"
                break
              fi
            fi
          done
          if [[ -z "${VERSION}" ]]; then
            echo "failed to read version from internal/dawnfetch/cli/run.go or internal/dawnfetch/run.go"
            exit 1
          fi
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "tag version (${TAG_VERSION}) does not match ${VERSION_FILE} version (${VERSION})"
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "using version from ${VERSION_FILE}: ${VERSION}"

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          goreleaser release --snapshot --clean

      - name: Build releases folder
        run: |
          mkdir -p releases
          find release-dist -maxdepth 1 -type f -exec cp {} releases/ \;
          cp cli/install.ps1 releases/install.ps1
          cp cli/install.sh releases/install.sh
          if ! find releases -maxdepth 1 -type f | grep -q .; then
            echo "no release files were collected from release-dist"
            exit 1
          fi
          echo "Release artifacts:"
          find releases -maxdepth 1 -type f | sort

      - name: Upload releases artifact
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ github.sha }}
          path: releases/
          if-no-files-found: error

      - name: Resolve release channel
        if: github.event_name == 'push'
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_VERSION="${VERSION#v}"
          echo "tag=v${CLEAN_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "name=dawnfetch v${CLEAN_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=false" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: "releases/*"
