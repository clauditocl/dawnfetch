name: npm-publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          BASE="$(sed -nE 's/^[[:space:]]*var[[:space:]]+version[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/p' internal/dawnfetch/run.go | head -n1)"
          if [[ -z "${BASE}" ]]; then
            echo "failed to read version from internal/dawnfetch/run.go"
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${TAG_VERSION}" != "${BASE}" ]]; then
              echo "tag version (${TAG_VERSION}) does not match run.go version (${BASE})"
              exit 1
            fi
            NPM_VERSION="${BASE}"
            NPM_TAG="latest"
          else
            NPM_VERSION="${BASE}-canary.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            NPM_TAG="canary"
          fi

          echo "base=${BASE}" >> "${GITHUB_OUTPUT}"
          echo "npm_version=${NPM_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "npm_tag=${NPM_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing npm version: ${NPM_VERSION} (tag: ${NPM_TAG})"

      - name: Update package.json version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.version = process.env.NPM_VERSION;
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          NODE
        env:
          NPM_VERSION: ${{ steps.ver.outputs.npm_version }}

      - name: Publish to npm
        run: npm publish --access public --tag "${NPM_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ steps.ver.outputs.npm_tag }}
